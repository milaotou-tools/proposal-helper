name: Fix 8085 Nginx Config

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ALIYUN_SSH_KEY }}

      - name: Create/fix nginx proxy config for port 8085
        env:
          ALIYUN_PORT: ${{ secrets.ALIYUN_PORT }}
        run: |
          SSH_PORT="${ALIYUN_PORT:-22}"
          ssh -p "$SSH_PORT" -o StrictHostKeyChecking=accept-new "${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }}" '
            echo "=== Checking existing 8083 config ==="
            find /www/server -name "*8083*" -path "*/nginx/*" -type f 2>/dev/null | head -5
            echo ""
            echo "=== Checking nginx include structure ==="
            grep -r "include" /www/server/nginx/conf/nginx.conf 2>/dev/null | head -10
            echo ""
            echo "=== Checking BT panel vhost includes ==="
            grep -r "include" /www/server/panel/vhost/nginx/ 2>/dev/null | head -10
            echo ""
            echo "=== Checking 8085 config files ==="
            find /www/server -name "*8085*" -type f 2>/dev/null | head -10
            echo ""
            echo "=== Is PM2 running on 3006? ==="
            pm2 list 2>/dev/null || echo "pm2 not available"
            echo ""
            echo "=== Check port 3006 ==="
            curl -s -o /dev/null -w "3006: HTTP %{http_code}" http://127.0.0.1:3006/ 2>/dev/null || echo "3006 not responding"
          '
