name: Fix 8085 Nginx Config

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ALIYUN_SSH_KEY }}

      - name: Reload nginx to apply 8085 proxy
        env:
          ALIYUN_PORT: ${{ secrets.ALIYUN_PORT }}
        run: |
          SSH_PORT="${ALIYUN_PORT:-22}"
          ssh -p "$SSH_PORT" -o StrictHostKeyChecking=accept-new "${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }}" '
            echo "=== Check nginx config ==="
            cat /www/server/panel/vhost/nginx/proxy/116.62.220.255_8085.conf 2>/dev/null || echo "Config not found!"
            echo ""
            echo "=== Test nginx config ==="
            /www/server/nginx/sbin/nginx -t 2>&1 || nginx -t 2>&1 || echo "nginx -t failed"
            echo ""
            echo "=== Reload nginx ==="
            /www/server/nginx/sbin/nginx -s reload 2>&1 || nginx -s reload 2>&1 || echo "reload failed"
            echo ""
            echo "=== Test 8085 ==="
            curl -s -o /dev/null -w "8085 local: HTTP %{http_code}\n" http://127.0.0.1:8085/
          '
