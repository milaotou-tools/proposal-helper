name: Fix 8085 Nginx Config

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ALIYUN_SSH_KEY }}

      - name: Diagnose 8085 nginx setup
        env:
          ALIYUN_PORT: ${{ secrets.ALIYUN_PORT }}
        run: |
          SSH_PORT="${ALIYUN_PORT:-22}"
          ssh -p "$SSH_PORT" -o StrictHostKeyChecking=accept-new "${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }}" '
          echo "=== Any nginx config referencing 8085? ==="
          find /www/server -name "*.conf" -path "*/nginx/*" -exec grep -l "8085" {} \; 2>/dev/null || echo "None found"

          echo ""
          echo "=== What listens on 8085? ==="
          ss -tlnp | grep 8085 || echo "Nothing on 8085"

          echo ""
          echo "=== Nginx main conf include structure ==="
          grep -n "include" /www/server/nginx/conf/nginx.conf 2>/dev/null || echo "No main conf"

          echo ""
          echo "=== Vhost dir listing ==="
          ls -la /www/server/panel/vhost/nginx/ 2>/dev/null || echo "No vhost dir"

          echo ""
          echo "=== Proxy dir listing ==="
          ls -la /www/server/panel/vhost/nginx/proxy/ 2>/dev/null || echo "No proxy dir"

          echo ""
          echo "=== Content of 8085 proxy config ==="
          cat /www/server/panel/vhost/nginx/proxy/116.62.220.255_8085.conf 2>/dev/null || echo "8085 proxy conf not found"

          echo ""
          echo "=== PM2 paid process ==="
          pm2 show proposal-helper-paid 2>/dev/null | head -15 || echo "PM2 process not found"

          echo ""
          echo "=== Curl direct to 3007 ==="
          curl -s -o /dev/null -w "3007 direct: HTTP %{http_code}\n" http://127.0.0.1:3007/
          '
