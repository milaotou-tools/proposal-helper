name: Fix 8085 Nginx Config

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ALIYUN_SSH_KEY }}

      - name: Redeploy paid version on port 3007 + fix nginx
        env:
          ALIYUN_PORT: ${{ secrets.ALIYUN_PORT }}
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          SSH_PORT="${ALIYUN_PORT:-22}"
          ssh -p "$SSH_PORT" -o StrictHostKeyChecking=accept-new "${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }}" '
            set -e

            echo "=== Check port 3007 ==="
            ss -tlnp | grep 3007 && echo "3007 in use!" || echo "3007 is free"
            fuser -k 3007/tcp 2>/dev/null || true
            sleep 1

            echo "=== Kill old paid PM2 ==="
            pm2 delete proposal-helper-paid 2>/dev/null || true
            pm2 save --force
            sleep 2

            echo "=== Rewrite .env.local ==="
            cd /www/wwwroot/proposal-helper-paid
            cat > .env.local << ENVEOF
            DEEPSEEK_API_KEY='"$DEEPSEEK_KEY"'
            DEEPSEEK_BASE_URL=https://api.deepseek.com
            DEEPSEEK_MODEL=deepseek-v4-pro
            ADMIN_PASSWORD=ktsb2026
            COLLECTION_DIR=/www/wwwdata/proposal-helper-paid/collection
            FEEDBACK_DIR=/www/wwwdata/proposal-helper-paid/feedback
            ENVEOF

            mkdir -p /www/wwwdata/proposal-helper-paid/collection
            mkdir -p /www/wwwdata/proposal-helper-paid/feedback

            echo "=== Start on port 3007 ==="
            pm2 start npx --name proposal-helper-paid -- next start -p 3007
            pm2 save

            sleep 5
            echo "=== Test 3007 ==="
            curl -s -o /dev/null -w "3007: HTTP %{http_code}\n" http://127.0.0.1:3007/

            echo "=== Update nginx proxy 8085 -> 3007 ==="
            cat > /www/server/panel/vhost/nginx/proxy/116.62.220.255_8085.conf << NGINXEOF
            server {
                listen 8085;
                server_name 116.62.220.255;
                access_log /www/wwwlogs/116.62.220.255_8085.log;
                error_log /www/wwwlogs/116.62.220.255_8085.error.log;

                location / {
                    proxy_pass http://127.0.0.1:3007;
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade \$http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_buffering off;
                    proxy_read_timeout 300s;
                    proxy_send_timeout 300s;
                }
            }
            NGINXEOF

            nginx -t && nginx -s reload && echo "Nginx OK"

            echo "=== Final test 8085 ==="
            curl -s -o /dev/null -w "8085: HTTP %{http_code}\n" http://127.0.0.1:8085/
          '
