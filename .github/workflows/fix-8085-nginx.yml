name: Fix 8085 Nginx Config

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ALIYUN_SSH_KEY }}

      - name: Fix pm2 and nginx for paid version
        env:
          ALIYUN_PORT: ${{ secrets.ALIYUN_PORT }}
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          SSH_PORT="${ALIYUN_PORT:-22}"
          ssh -p "$SSH_PORT" -o StrictHostKeyChecking=accept-new "${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }}" '
            echo "=== PM2 logs for proposal-helper-paid (last 30 lines) ==="
            pm2 logs proposal-helper-paid --lines 30 --nostream 2>/dev/null || echo "No logs"
            echo ""
            echo "=== Checking .env.local ==="
            cat /www/wwwroot/proposal-helper-paid/.env.local 2>/dev/null || echo "No .env.local"
            echo ""
            echo "=== Trying to start manually ==="
            pm2 delete proposal-helper-paid 2>/dev/null || true
            fuser -k 3006/tcp 2>/dev/null || true
            sleep 2
            cd /www/wwwroot/proposal-helper-paid
            PORT=3006 npx next start -p 3006 &
            sleep 5
            curl -s -o /dev/null -w "Manual start: HTTP %{http_code}\n" http://127.0.0.1:3006/
            pkill -f "next start -p 3006" 2>/dev/null || true
          '
