name: Fix 8085 Nginx Config

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ALIYUN_SSH_KEY }}

      - name: Fix 8085 nginx include path
        env:
          ALIYUN_PORT: ${{ secrets.ALIYUN_PORT }}
        run: |
          SSH_PORT="${ALIYUN_PORT:-22}"
          ssh -p "$SSH_PORT" -o StrictHostKeyChecking=accept-new "${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }}" '
          echo "=== Copy proxy config to vhost dir ==="
          # The nginx include is: include /www/server/panel/vhost/nginx/*.conf
          # It only matches *.conf directly in the vhost dir, NOT in proxy/ subdir
          # So copy the server block up to the vhost directory
          cp -v /www/server/panel/vhost/nginx/proxy/116.62.220.255_8085.conf /www/server/panel/vhost/nginx/116.62.220.255_8085.conf

          echo ""
          echo "=== Delete old proxy file to avoid confusion ==="
          rm -f /www/server/panel/vhost/nginx/proxy/116.62.220.255_8085.conf

          echo ""
          echo "=== Test nginx config ==="
          /www/server/nginx/sbin/nginx -t 2>&1 && echo "PASS" || { echo "FAIL"; exit 1; }

          echo ""
          echo "=== Reload nginx ==="
          /www/server/nginx/sbin/nginx -s reload 2>&1 && echo "Reloaded OK" || { echo "Reload failed"; exit 1; }

          sleep 2

          echo ""
          echo "=== Test 8085 ==="
          curl -s -o /dev/null -w "8085: HTTP %{http_code}\n" http://127.0.0.1:8085/
          '
