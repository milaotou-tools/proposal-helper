name: Fix 8085 Nginx Config

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ALIYUN_SSH_KEY }}

      - name: Create/fix nginx proxy config for port 8085
        env:
          ALIYUN_PORT: ${{ secrets.ALIYUN_PORT }}
        run: |
          SSH_PORT="${ALIYUN_PORT:-22}"
          ssh -p "$SSH_PORT" -o StrictHostKeyChecking=accept-new "${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }}" '
            # Create the nginx proxy config for 8085
            mkdir -p /www/server/panel/vhost/nginx/proxy

            cat > /www/server/panel/vhost/nginx/proxy/116.62.220.255_8085.conf << NGINXEOF
            server {
                listen 8085;
                server_name 116.62.220.255;
                access_log /www/wwwlogs/116.62.220.255_8085.log;
                error_log /www/wwwlogs/116.62.220.255_8085.error.log;

                location / {
                    proxy_pass http://127.0.0.1:3006;
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade \$http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_buffering off;
                    proxy_read_timeout 300s;
                    proxy_send_timeout 300s;
                }
            }
            NGINXEOF

            echo "Config created:"
            cat /www/server/panel/vhost/nginx/proxy/116.62.220.255_8085.conf

            # Test and reload
            nginx -t && nginx -s reload && echo "Nginx reloaded OK" || echo "Nginx test failed"
          '
