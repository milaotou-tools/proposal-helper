name: Fix 8085 Nginx Config

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ALIYUN_SSH_KEY }}

      - name: Open firewall and test 8085
        env:
          ALIYUN_PORT: ${{ secrets.ALIYUN_PORT }}
        run: |
          SSH_PORT="${ALIYUN_PORT:-22}"
          ssh -p "$SSH_PORT" -o StrictHostKeyChecking=accept-new "${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }}" '
          echo "=== Open port 8085 via iptables ==="
          iptables -I INPUT -p tcp --dport 8085 -j ACCEPT 2>&1 || true
          service iptables save 2>/dev/null || true

          # Also check if BT Panel has its own firewall
          if [ -f /etc/init.d/bt ]; then
            echo "BT Panel found, checking firewall panel"
            bt 14 2>/dev/null || true
          fi

          echo ""
          echo "=== Check iptables rules for 8085 ==="
          iptables -L INPUT -n 2>/dev/null | grep 8085 || echo "No iptables rule for 8085"

          echo ""
          echo "=== Test 8085 local ==="
          curl -s -o /dev/null -w "8085 local: HTTP %{http_code}\n" http://127.0.0.1:8085/
          '

      - name: Test 8085 from GitHub Actions runner
        run: |
          echo "=== Testing port 8085 from runner ==="
          curl -s -o /dev/null -w "8085 from runner: HTTP %{http_code}\n" http://116.62.220.255:8085/ --connect-timeout 15 || echo "Connection failed from runner"

          echo ""
          echo "=== Testing port 8083 for comparison ==="
          curl -s -o /dev/null -w "8083 from runner: HTTP %{http_code}\n" http://116.62.220.255:8083/ --connect-timeout 15 || echo "Connection failed"
