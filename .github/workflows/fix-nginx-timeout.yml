name: Fix Nginx Proxy Timeout

on:
  workflow_dispatch:

jobs:
  fix-nginx:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ALIYUN_SSH_KEY }}

      - name: Trust server host key
        env:
          ALIYUN_PORT: ${{ secrets.ALIYUN_PORT }}
        run: |
          SSH_PORT="${ALIYUN_PORT:-22}"
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" -H "${{ secrets.ALIYUN_HOST }}" >> ~/.ssh/known_hosts

      - name: Update Nginx timeout
        env:
          ALIYUN_PORT: ${{ secrets.ALIYUN_PORT }}
        run: |
          SSH_PORT="${ALIYUN_PORT:-22}"
          ssh -p "$SSH_PORT" "${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }}" 'bash -s' << 'SSHSCRIPT'
          SITE_CONF=$(grep -rl "8083" /www/server/panel/vhost/nginx/proxy/ 2>/dev/null | head -1)
          if [ -z "$SITE_CONF" ]; then
            SITE_CONF=$(grep -rl "8083" /www/server/panel/vhost/nginx/ 2>/dev/null | head -1)
          fi
          if [ -z "$SITE_CONF" ]; then
            echo "ERROR: Cannot find Nginx config for port 8083"
            exit 1
          fi
          echo "=== Config file: $SITE_CONF ==="
          if grep -q "proxy_read_timeout" "$SITE_CONF"; then
            sed -i 's/proxy_read_timeout [0-9]*s\{0,1\};/proxy_read_timeout 180s;/g' "$SITE_CONF"
            sed -i 's/proxy_connect_timeout [0-9]*s\{0,1\};/proxy_connect_timeout 180s;/g' "$SITE_CONF"
            sed -i 's/proxy_send_timeout [0-9]*s\{0,1\};/proxy_send_timeout 180s;/g' "$SITE_CONF"
            echo "Updated existing timeout settings"
          else
            sed -i 's|proxy_pass http://127.0.0.1:3005;|proxy_pass http://127.0.0.1:3005;\n    proxy_connect_timeout 180s;\n    proxy_read_timeout 180s;\n    proxy_send_timeout 180s;|' "$SITE_CONF"
            echo "Added timeout settings"
          fi
          echo ""
          echo "=== New config ==="
          cat "$SITE_CONF"
          echo ""
          nginx -t && nginx -s reload && echo "Nginx reloaded OK"
          SSHSCRIPT
