name: Check Server Files

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ALIYUN_SSH_KEY }}

      - name: Trust host key
        env:
          ALIYUN_PORT: ${{ secrets.ALIYUN_PORT }}
        run: |
          SSH_PORT="${ALIYUN_PORT:-22}"
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" -H "${{ secrets.ALIYUN_HOST }}" >> ~/.ssh/known_hosts

      - name: Check manifest
        env:
          ALIYUN_PORT: ${{ secrets.ALIYUN_PORT }}
        run: |
          SSH_PORT="${ALIYUN_PORT:-22}"
          ssh -p "$SSH_PORT" "${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }}" '
          echo "=== Build manifest page references ==="
          grep -o "page-[a-f0-9]*\.js" /www/wwwroot/proposal-helper/.next/server/app/page.js || echo "no refs"
          echo ""
          echo "=== Build manifest ==="
          python3 -c "
          import json
          with open(\"/www/wwwroot/proposal-helper/.next/build-manifest.json\") as f:
              d = json.load(f)
              for k, v in d.items():
                  if \"page\" in str(v).lower() or \"page\" in k.lower():
                      print(f\"{k}: {v}\")
          " 2>/dev/null || echo "no python"
          echo ""
          echo "=== Client manifest page references ==="
          cat /www/wwwroot/proposal-helper/.next/server/client-reference-manifest.json 2>/dev/null | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          for k in d:
              if \"Feedback\" in k or \"page\" in k:
                  print(f\"{k}: {d[k]}\")
          " 2>/dev/null || echo "no client refs"
          '
