name: Check Server Files

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ALIYUN_SSH_KEY }}

      - name: Trust host key
        env:
          ALIYUN_PORT: ${{ secrets.ALIYUN_PORT }}
        run: |
          SSH_PORT="${ALIYUN_PORT:-22}"
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" -H "${{ secrets.ALIYUN_HOST }}" >> ~/.ssh/known_hosts

      - name: Check built JS
        env:
          ALIYUN_PORT: ${{ secrets.ALIYUN_PORT }}
        run: |
          SSH_PORT="${ALIYUN_PORT:-22}"
          ssh -p "$SSH_PORT" "${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }}" '
          echo "=== Source file placeholder ==="
          grep "请填写您所在学校" /www/wwwroot/proposal-helper/components/FeedbackWidget.tsx || echo "NOT FOUND"

          echo ""
          echo "=== Built JS contains new text ==="
          grep -rl "请填写您所在学校" /www/wwwroot/proposal-helper/.next/ 2>/dev/null || echo "NOT FOUND in .next"

          echo ""
          echo "=== Built JS contains old text ==="
          grep -rl "学校名称（选填）" /www/wwwroot/proposal-helper/.next/ 2>/dev/null || echo "NOT FOUND in .next"

          echo ""
          echo "=== .next build time ==="
          ls -la /www/wwwroot/proposal-helper/.next/BUILD_ID 2>/dev/null && cat /www/wwwroot/proposal-helper/.next/BUILD_ID

          echo ""
          echo "=== Page JS chunk ==="
          ls -la /www/wwwroot/proposal-helper/.next/static/chunks/app/page-*.js 2>/dev/null
          '
