name: Check Server Files

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ALIYUN_SSH_KEY }}

      - name: Trust host key
        env:
          ALIYUN_PORT: ${{ secrets.ALIYUN_PORT }}
        run: |
          SSH_PORT="${ALIYUN_PORT:-22}"
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" -H "${{ secrets.ALIYUN_HOST }}" >> ~/.ssh/known_hosts

      - name: Check HTML
        env:
          ALIYUN_PORT: ${{ secrets.ALIYUN_PORT }}
        run: |
          SSH_PORT="${ALIYUN_PORT:-22}"
          ssh -p "$SSH_PORT" "${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }}" '
          echo "=== Server HTML references ==="
          grep -o "page-[a-f0-9]*\.js" /www/wwwroot/proposal-helper/.next/server/app/page.js 2>/dev/null | head -5
          echo ""
          echo "=== Built chunks ==="
          ls /www/wwwroot/proposal-helper/.next/static/chunks/app/page-*.js 2>/dev/null
          echo ""
          echo "=== pm2 status ==="
          pm2 show proposal-helper 2>/dev/null | grep -E "status|pid|restarts|uptime"
          '
