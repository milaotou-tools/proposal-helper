name: View Collected Data

on:
  workflow_dispatch:

jobs:
  view:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ALIYUN_SSH_KEY }}

      - name: Trust host key
        env:
          ALIYUN_PORT: ${{ secrets.ALIYUN_PORT }}
        run: |
          SSH_PORT="${ALIYUN_PORT:-22}"
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" -H "${{ secrets.ALIYUN_HOST }}" >> ~/.ssh/known_hosts

      - name: Show collected data
        env:
          ALIYUN_PORT: ${{ secrets.ALIYUN_PORT }}
        run: |
          SSH_PORT="${ALIYUN_PORT:-22}"
          ssh -p "$SSH_PORT" "${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }}" '
          COLLECTION="/www/wwwdata/proposal-helper/collection"
          FEEDBACK="/www/wwwdata/proposal-helper/feedback"

          echo "=== 数据采集 ==="
          if [ -d "$COLLECTION" ]; then
            for f in $(ls -1t "$COLLECTION"/*.json 2>/dev/null); do
              lines=$(wc -l < "$f")
              echo "--- $(basename "$f") ($lines 条) ---"
              head -5 "$f" | python3 -c "
import sys, json
for line in sys.stdin:
    d = json.loads(line.strip())
    print(f\"  时间: {d.get(\"timestamp\",\"?\")[:19]}\")
    print(f\"  操作: {d.get(\"action\",\"?\")}\")
    inp = d.get(\"input\", {})
    print(f\"  输入: {json.dumps(inp, ensure_ascii=False)[:100]}\")
    print(f\"  输出: {len(d.get(\"outputText\",\"\"))} 字符\")
    print()
" 2>/dev/null
              echo ""
            done
            total=$(find "$COLLECTION" -name "*.json" -exec cat {} \; | wc -l)
            echo "总计: $total 条记录"
          else
            echo "目录不存在"
          fi

          echo ""
          echo "=== 反馈数据 ==="
          if [ -d "$FEEDBACK" ]; then
            for f in $(ls -1t "$FEEDBACK"/*.json 2>/dev/null); do
              echo "--- $(basename "$f") ---"
              cat "$f" | python3 -m json.tool 2>/dev/null || cat "$f"
              echo ""
            done
          else
            echo "无反馈数据"
          fi
          '
