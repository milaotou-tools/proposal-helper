name: Deploy via SCP (bypass git)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ALIYUN_SSH_KEY }}

      - name: Trust server host key
        env:
          ALIYUN_PORT: ${{ secrets.ALIYUN_PORT }}
        run: |
          SSH_PORT="${ALIYUN_PORT:-22}"
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" -H "${{ secrets.ALIYUN_HOST }}" >> ~/.ssh/known_hosts

      - name: Tar and SCP source
        env:
          ALIYUN_PORT: ${{ secrets.ALIYUN_PORT }}
        run: |
          SSH_PORT="${ALIYUN_PORT:-22}"
          USER_HOST="${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }}"

          tar --exclude='.git' --exclude='node_modules' --exclude='.next' --exclude='.env' \
            -czf /tmp/deploy.tar.gz .

          scp -P "$SSH_PORT" /tmp/deploy.tar.gz "$USER_HOST:/tmp/deploy.tar.gz"

      - name: Clean rebuild and restart
        env:
          ALIYUN_PORT: ${{ secrets.ALIYUN_PORT }}
        run: |
          SSH_PORT="${ALIYUN_PORT:-22}"
          ssh -p "$SSH_PORT" "${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }}" '
          set -e

          # Kill PM2 first so .next files are not locked
          pm2 delete proposal-helper 2>/dev/null || true
          pm2 save --force
          sleep 2
          fuser -k 3005/tcp 2>/dev/null || true
          sleep 2

          cd /www/wwwroot/proposal-helper

          # Clean old build completely
          rm -rf .next
          if [ -d ".next" ]; then
            echo "ERROR: .next still exists after rm -rf"
            ls -la .next/
            exit 1
          fi
          echo ".next cleaned OK"

          # Extract new source
          tar -xzf /tmp/deploy.tar.gz
          rm /tmp/deploy.tar.gz

          # Build
          export NPM_CACHE_DIR="$HOME/.npm-cache"
          mkdir -p "$NPM_CACHE_DIR"
          export npm_config_cache="$NPM_CACHE_DIR"
          npm run build

          # Verify new build — the page chunk must match what the HTML references
          BUILT_CHUNK=$(ls .next/static/chunks/app/page-*.js 2>/dev/null | head -1 | xargs basename)
          echo "=== Built page chunk: $BUILT_CHUNK ==="
          REFERENCED=$(grep -oP 'static/chunks/app/page-[a-f0-9]+\.js' .next/server/app/page.js 2>/dev/null | head -1 | xargs basename)
          echo "=== Referenced in page.js: $REFERENCED ==="
          if [ "$BUILT_CHUNK" != "$REFERENCED" ]; then
            echo "ERROR: Page chunk mismatch! Built=$BUILT_CHUNK Referenced=$REFERENCED"
            echo "All page chunks on disk:"
            ls .next/static/chunks/app/page-*.js 2>/dev/null
            echo "All page references in server output:"
            grep -roP 'static/chunks/app/page-[a-f0-9]+\.js' .next/server/ 2>/dev/null | sort -u
            exit 1
          fi
          echo "Page chunk verified OK: $BUILT_CHUNK"

          # Start fresh
          pm2 start npx --name proposal-helper -- next start -p 3005
          pm2 save

          echo "=== PM2 status ==="
          pm2 list
          pm2 logs proposal-helper --lines 5 --nostream

          echo "Deploy done"
          '
