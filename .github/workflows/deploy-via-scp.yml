name: Deploy via SCP (bypass git)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ALIYUN_SSH_KEY }}

      - name: Trust server host key
        env:
          ALIYUN_PORT: ${{ secrets.ALIYUN_PORT }}
        run: |
          SSH_PORT="${ALIYUN_PORT:-22}"
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" -H "${{ secrets.ALIYUN_HOST }}" >> ~/.ssh/known_hosts

      - name: SCP source files to server
        env:
          ALIYUN_PORT: ${{ secrets.ALIYUN_PORT }}
        run: |
          SSH_PORT="${ALIYUN_PORT:-22}"
          SCP="scp -o StrictHostKeyChecking=yes -P $SSH_PORT -r"
          USER_HOST="${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }}"
          DEST="/www/wwwroot/proposal-helper"

          # Upload source directories
          $SCP app "$USER_HOST:$DEST/"
          $SCP components "$USER_HOST:$DEST/"
          $SCP lib "$USER_HOST:$DEST/"

          # Upload config files
          $SCP package.json next.config.ts tsconfig.json postcss.config.mjs tailwind.config.ts "$USER_HOST:$DEST/"

      - name: Build and restart
        env:
          ALIYUN_PORT: ${{ secrets.ALIYUN_PORT }}
        run: |
          SSH_PORT="${ALIYUN_PORT:-22}"
          ssh -p "$SSH_PORT" "${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }}" '
          cd /www/wwwroot/proposal-helper
          export NPM_CACHE_DIR="$HOME/.npm-cache"
          mkdir -p "$NPM_CACHE_DIR"
          export npm_config_cache="$NPM_CACHE_DIR"
          npm run build
          pm2 restart proposal-helper --update-env
          echo "Deploy done"
          '
