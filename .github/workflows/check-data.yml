name: Check Collected Data

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ALIYUN_SSH_KEY }}

      - name: Trust host key
        env:
          ALIYUN_PORT: ${{ secrets.ALIYUN_PORT }}
        run: |
          SSH_PORT="${ALIYUN_PORT:-22}"
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" -H "${{ secrets.ALIYUN_HOST }}" >> ~/.ssh/known_hosts

      - name: Show collection data
        env:
          ALIYUN_PORT: ${{ secrets.ALIYUN_PORT }}
        run: |
          SSH_PORT="${ALIYUN_PORT:-22}"
          ssh -p "$SSH_PORT" "${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }}" '
          COLLECTION_DIR="/www/wwwdata/proposal-helper/collection"
          echo "=== Data directory ==="
          ls -la "$COLLECTION_DIR/" 2>/dev/null || echo "Directory not found"
          echo ""

          if [ -d "$COLLECTION_DIR" ]; then
            TOTAL=$(find "$COLLECTION_DIR" -name "*.json" -type f | wc -l)
            echo "=== Files: $TOTAL files ==="
            echo ""

            for f in $(ls -1t "$COLLECTION_DIR/"*.json 2>/dev/null); do
              LINES=$(wc -l < "$f")
              echo "--- $(basename "$f") ($LINES entries) ---"
              head -3 "$f" 2>/dev/null | python3 -c "
      import sys, json
      for line in sys.stdin:
          try:
              d = json.loads(line.strip())
              print(f\"  时间: {d.get(\"timestamp\",\"?\")[:19]}\")
              print(f\"  动作: {d.get(\"action\",\"?\")}\")
              inp = d.get(\"input\", {})
              print(f\"  输入摘要: {json.dumps(inp, ensure_ascii=False)[:120]}\")
              out = d.get(\"outputText\", \"\")
              print(f\"  输出长度: {len(out)} 字符\")
              print()
          except:
              print(f\"  (parse error) {line[:80]}\")
      " 2>/dev/null || head -3 "$f"
              echo ""
            done

            echo "=== Total entries ==="
            find "$COLLECTION_DIR" -name "*.json" -type f -exec cat {} \; | wc -l
          fi

          echo ""
          echo "=== Feedback data ==="
          FEEDBACK_DIR="/www/wwwdata/proposal-helper/feedback"
          ls -la "$FEEDBACK_DIR/" 2>/dev/null || echo "No feedback dir"
          if [ -d "$FEEDBACK_DIR" ]; then
            for f in $(ls -1t "$FEEDBACK_DIR/"*.json 2>/dev/null); do
              echo "--- $(basename "$f") ---"
              cat "$f" 2>/dev/null
              echo ""
            done
          fi
          '
